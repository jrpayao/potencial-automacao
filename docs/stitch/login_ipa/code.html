<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>IPA - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-container": "#4d5081",
              "on-secondary": "#ffffff",
              "on-secondary-fixed": "#131645",

              "on-tertiary-fixed-variant": "#6f3812",

              "on-primary-fixed": "#001c39",
              "on-secondary-fixed-variant": "#3f4273",
              "on-tertiary-fixed": "#321200",
              "on-surface-variant": "#43474f",
              "primary-container": "#003461",
              "tertiary-fixed-dim": "#ffb68c",
              "background": "#f8f9fa",
              "tertiary-container": "#572501",
              "surface-container-high": "#e7e8e9",
              "on-primary-container": "#799ed1",
              "on-primary-fixed-variant": "#1f4876",
              "surface-container": "#edeeef",
              "on-error": "#ffffff",
              "error": "#ba1a1a",
              "surface-bright": "#f8f9fa",
              "inverse-on-surface": "#f0f1f2",
              "inverse-primary": "#a4c9fe",
              "surface-dim": "#d9dadb",
              "outline": "#737780",
              "on-tertiary-container": "#d58a5d",
              "surface-container-highest": "#e1e3e4",
              "on-tertiary": "#ffffff",
              "primary-fixed": "#d3e3ff",
              "on-background": "#191c1d",
              "tertiary-fixed": "#ffdbc9",
              "secondary-container": "#c2c5fe",
              "surface-tint": "#3a608f",
              "error-container": "#ffdad6",
              "secondary-fixed": "#e0e0ff",
              "secondary-fixed-dim": "#bfc2fb",
              "primary-fixed-dim": "#a4c9fe",
              "on-error-container": "#93000a",
              "on-primary": "#ffffff",
              "outline-variant": "#c3c6d0",
              "surface-container-low": "#f3f4f5",
              "secondary": "#575a8c",
              "surface": "#f8f9fa",
              "on-surface": "#191c1d"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }

<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .login-gradient {
            background: linear-gradient(135deg, #000033 0%, #003461 100%);
        }
        .ghost-border {
            border: 1px solid rgba(195, 198, 208, 0.15);
        }
        .ambient-shadow {
            box-shadow: 0 24px 40px rgba(0, 31, 61, 0.08);
        }
    </style>
</head>
<body class="bg-background text-on-surface m-0 p-0 overflow-hidden">
<div class="login-gradient min-h-screen flex flex-col items-center justify-center p-6 relative">
<!-- Background Texture Overlay -->
<div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 40px 40px;"></div>
<!-- Login Card -->
<main class="w-full max-w-[420px] bg-surface-container-lowest rounded-[16px] p-[40px] ambient-shadow relative z-10 flex flex-col">
<!-- Logo Section -->
<header class="mb-10 text-center">
<h1 class="text-[36px] font-black text-primary-container leading-none tracking-tight">
                    IPA
                </h1>
<p class="text-[14px] font-medium text-outline mt-2 tracking-tight">
                    Índice de Potencial de Automação
                </p>
</header>
<!-- Login Form -->
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-[12px] font-semibold text-on-surface-variant ml-1" for="email">
                        E-mail
                    </label>
<div class="relative">
<input class="w-full h-12 px-4 bg-transparent ghost-border rounded-lg text-on-surface focus:ring-1 focus:ring-primary-container focus:border-primary-container transition-all outline-none text-sm placeholder:text-outline-variant" id="email" name="email" placeholder="seu@email.com.br" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-[12px] font-semibold text-on-surface-variant" for="password">
                            Senha
                        </label>
<a class="text-[11px] font-medium text-primary-container hover:underline" href="#">Esqueceu a senha?</a>
</div>
<div class="relative">
<input class="w-full h-12 px-4 bg-transparent ghost-border rounded-lg text-on-surface focus:ring-1 focus:ring-primary-container focus:border-primary-container transition-all outline-none text-sm placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-[48px] bg-primary-container text-white font-bold rounded-[8px] hover:opacity-95 active:scale-[0.98] transition-all flex items-center justify-center text-sm uppercase tracking-wider" type="submit">
                    Entrar
                </button>
</form>
<!-- Support Links -->
<div class="mt-8 pt-8 border-t border-surface-container text-center">
<p class="text-[12px] text-outline-variant font-medium leading-relaxed">
                    Sistema de Avaliação de Potencial de Automação
                </p>
</div>
</main>
<!-- Aesthetic Footer/Copyright for the full screen -->
<footer class="mt-8 text-white/40 text-[10px] font-medium tracking-[0.2em] uppercase">
            © 2024 Governança Digital &amp; Automação Inteligente
        </footer>
</div>
<!-- Decorative Image Component (Background abstraction) -->
<div class="hidden">
<img alt="Background abstraction" data-alt="smooth gradient flowing from deep navy to soft primary blue with subtle grain texture and geometric crystalline structures" src="https://lh3.googleusercontent.com/aida-public/AB6AXuATqbAIP8g0EtvlG-pJUO9LCzLwh-L2ku4lYfRGzx8SWQ20NSmdrEzO6fm8zq1YrgLbLOjGMjfeDoWZVOAT_ntmwa3asmHdsMaa1RkMU2h-SxY0RxZyM92DjWBAzeUnqXKNggiFdFVI-YMTQ3FGFYB8RNISDthIkgleKQFIYyKhOAfp9Y1dQOffH5VMizfOtqWRe7sQpiSymQBAaoHKEUe-SfLFa3Pn2w7Mr-1QUEfGsCQH6rp4GeQGx0smuIv9eTxtUbz1yoiXsxYU"/>
</div>
</body></html>
