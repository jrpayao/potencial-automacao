services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ipa
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]

  api:
    build: { context: ., dockerfile: Dockerfile.caprover.api }
    ports: ["3000:3000"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: ipa
    depends_on: [postgres]

  frontend:
    build: { context: ., dockerfile: Dockerfile.caprover.frontend }
    ports: ["80:80"]
    depends_on: [api]

volumes:
  postgres_data:
